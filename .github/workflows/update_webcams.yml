name: Update DriveBC Webcam Data

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of each month at 03:00 UTC (8pm Pacific)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install httpx
        run: pip install httpx

      - name: Fetch webcam data
        run: python scripts/fetch_webcams.py

      - name: Commit if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/webcams.json
          if git diff --staged --quiet; then
            echo "No changes to webcam data"
          else
            git commit -m "Auto-update DriveBC webcam data [skip ci]"
            git push
          fi
